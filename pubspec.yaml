name: shine_gold
description: Shine Gold Organic Agro Invention - field executive & admin app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  dio: ^5.7.0
  shared_preferences: ^2.3.3
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  intl: ^0.19.0
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  table_calendar: ^3.1.3
  cached_network_image: ^3.4.1
  uuid: ^4.5.1
  audioplayers: ^6.4.0
  record: ^6.0.0
  url_launcher: ^6.3.1
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.1
  path_provider: ^2.1.6
  connectivity_plus: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/maps/india_states.json
